server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. SPA-Fallback: Redirect unknown paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Caching Hashed Assets for Long-Term Use
    location ~* \.(?:js|css|woff2?|png|jpe?g|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}